<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>阶段详情</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components-v2.css" />
</head>
<body data-page="stage">
  <div class="container" id="stage-content">
    <div class="top-nav">
      <a class="back-link" href="index.html">← 返回首页</a>
      <div data-stage-title>阶段</div>
      <div data-stage-progress>0/0 已读</div>
    </div>

    <section id="stage-hero" class="card hero"></section>
    <section id="stage-videos" class="card" style="margin-bottom:16px;"></section>

    <section id="stage-toc" class="card" style="margin-bottom:16px;">
      <button id="toc-toggle" class="collapsible-toggle">
        <span>章节目录</span>
        <span>展开</span>
      </button>
      <div id="toc-panel" class="collapsible" style="margin-top:12px;">
        <div id="toc-list" style="display:grid; gap:10px;"></div>
      </div>
    </section>

    <div id="sections-container"></div>

    <section id="stage-prompts" class="card" style="margin-bottom:16px;">
      <div class="section-title">AI 协作区</div>
      <p class="muted">复制模板直接使用，避免踩坑</p>
      <div id="prompt-templates" style="display:grid; gap:12px; margin-top:12px;"></div>
      <div style="height:16px;"></div>
      <div class="section-title">AI 失败案例</div>
      <div id="ai-fails" style="display:grid; gap:12px; margin-top:12px;"></div>
    </section>

    <section id="stage-exercises" class="card" style="margin-bottom:16px;">
      <div class="section-title">练习挑战</div>
      <div id="exercise-list" style="margin-top:12px;"></div>
    </section>

    <section id="stage-checklist" class="card" style="margin-bottom:16px;">
      <div class="section-title">Checklist</div>
      <div id="checklist"></div>
    </section>

    <section id="stage-next" class="card" style="margin-bottom:16px;">
      <div class="section-title">下一关提示</div>
      <p id="stage-link" class="muted"></p>
    </section>

    <div id="bottom-stage-nav" class="bottom-stage-nav"></div>

    <div id="stage-loading" class="muted loading">
      <span class="loading-spinner" aria-hidden="true"></span>
      <span>加载中...</span>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" data-page="home"><span class="nav-icon">🏠</span><span>首页</span></a>
    <a href="#stage-prompts" data-page="lab"><span class="nav-icon">🧪</span><span>AI 协作</span></a>
    <a href="#stage-toc" data-page="glossary"><span class="nav-icon">📖</span><span>目录</span></a>
    <a href="#stage-checklist" data-page="progress"><span class="nav-icon">📊</span><span>进度</span></a>
  </nav>

  <script src="js/app.js?v=2"></script>
  <script src="js/rpg.js?v=1"></script>
  <script src="js/glossary-sheet.js?v=1"></script>
  <script src="js/diagrams.js?v=1"></script>
  <script src="js/interactive.js?v=1"></script>
  <script src="js/stage-renderer-v2.js"></script>
</body>
</html>
